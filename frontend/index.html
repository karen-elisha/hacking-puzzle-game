function initMatrix(){
  const c=document.getElementById('canvas-bg');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const cols=Math.floor(c.width/16);
  const drops=Array(cols).fill(1);
  const chars='01アイウエオカキクケコサシスセソABCDEFGHIJKLMNOPQRSTUVWXYZ<>{}[]()#@!';
  function draw(){
    ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#00ff41';ctx.font='14px monospace';
    drops.forEach((y,i)=>{
      const char=chars[Math.floor(Math.random()*chars.length)];
      ctx.fillStyle=i%5===0?'#00fff9':'#00ff41';
      ctx.globalAlpha=0.6;
      ctx.fillText(char,i*16,y*16);
      if(y*16>c.height&&Math.random()>0.975)drops[i]=0;
      drops[i]++;
    });
  }
  return setInterval(draw,50);
}

/* ===== HELPERS ===== */
function rot13(s){return s.replace(/[a-z]/gi,c=>{const base=c<='Z'?65:97;return String.fromCharCode((c.charCodeAt(0)-base+13)%26+base);});}
function hexToAscii(h){return h.replace(/\s/g,'').match(/.{1,2}/g)?.map(x=>String.fromCharCode(parseInt(x,16))).join('')||'';}
function caesarDecrypt(s,n){return s.replace(/[a-z]/gi,c=>{const base=c<='Z'?65:97;return String.fromCharCode((c.charCodeAt(0)-base-n+26)%26+base);});}
function atob64(s){try{return atob(s);}catch{return 'Invalid Base64';}}
function xorCalc(a,b){return a^b;}

/* ===== NOTIFICATIONS ===== */
function NotifContainer({notifs,setNotifs}){
  useEffect(()=>{
    if(!notifs.length)return;
    const last=notifs[notifs.length-1];
    const t=setTimeout(()=>setNotifs(p=>p.filter(n=>n.id!==last.id)),last.dur||3000);
    return()=>clearTimeout(t);
  },[notifs]);
  return(
    <div className="notif">
      {notifs.map(n=>(
        <div key={n.id} className={`notif-item ${n.type==='error'?'error':n.type==='gold'?'gold':''}`}>
          {n.type==='error'?'⚠️':n.type==='gold'?'🏆':'✔️'} {n.msg}
        </div>
      ))}
    </div>
  );
}

/* ===== PUZZLES TAB ===== */
function PuzzlesTab({cu,updateCu,log}){
  const[diff,setDiff]=useState('easy');
  const[puzzle,setPuzzle]=useState(null);
  const[ans,setAns]=useState('');
  const[timer,setTimer]=useState(0);
  const[timerActive,setTimerActive]=useState(false);
  const[showHint,setShowHint]=useState(false);
  const[hintUsed,setHintUsed]=useState(false);
  const timerRef=useRef(null);

  const LIMITS={easy:120,medium:90,hard:60};

  const startTimer=(lim)=>{
    clearInterval(timerRef.current);
    setTimer(lim);setTimerActive(true);
    timerRef.current=setInterval(()=>{
      setTimer(t=>{
        if(t<=1){clearInterval(timerRef.current);setTimerActive(false);SFX.play('error');
          notify('⏱️ TIME EXPIRED!','error');log('⏱️ TIME EXPIRED! Puzzle failed.','error');
          setPuzzle(null);return 0;}
        if(t<=10)SFX.play('type');
        return t-1;
      });
    },1000);
  };

  const getRandomPuzzle=()=>{
    SFX.play('click');
    clearInterval(timerRef.current);
    const pool=PUZZLES[diff];
    const p=pool[Math.floor(Math.random()*pool.length)];
    setPuzzle(p);setAns('');setShowHint(false);setHintUsed(false);
    startTimer(LIMITS[diff]);
    log(`🎯 NEW PUZZLE [${diff.toUpperCase()}]: ${p.title} | Reward: ${p.xp}XP ${p.coins}💰`,'info');
  };

  const submit=()=>{
    if(!puzzle)return;
    SFX.play('click');
    const correct=ans.trim().toLowerCase()===puzzle.a.toLowerCase();
    if(correct){
      clearInterval(timerRef.current);setTimerActive(false);
      const bonus=hintUsed?0.7:1;
      const xpGain=Math.round(puzzle.xp*bonus);
      const coinGain=Math.round(puzzle.coins*bonus);
      const timebonus=Math.round((timer/LIMITS[diff])*50);
      const totalXp=xpGain+timebonus;
      let newXp=cu.xp+totalXp,newTotalXp=cu.totalXp+totalXp;
      let newLevel=cu.level,newCoins=cu.coins+coinGain;
      const xpNext=cu.level*400;
      let levelUp=false;
      while(newXp>=newLevel*400){newXp-=newLevel*400;newLevel++;levelUp=true;}
      const done=[...(cu.completedPuzzles||[]),puzzle.id];
      const updated={...cu,xp:newXp,totalXp:newTotalXp,level:newLevel,coins:newCoins,hacks:cu.hacks+1,completedPuzzles:done,streak:(cu.streak||0)+1};
      updateCu(updated);
      SFX.play(levelUp?'levelup':'success');
      notify(`✅ HACK SUCCESS! +${totalXp}XP +${coinGain}💰${timebonus>0?' (⚡time bonus: +'+timebonus+'xp)':''}${hintUsed?' (-30% hint penalty)':''}`,levelUp?'gold':'info');
      log(`✅ CORRECT! +${totalXp}XP +${coinGain}💰${levelUp?' | 🎉 LEVEL UP → '+newLevel:''}${timebonus>0?' | ⚡+'+timebonus+'xp time bonus':''}${hintUsed?' | ⚠️ hint penalty applied':''}`,levelUp?'gold':'success');
      if(levelUp)notify('🎉 LEVEL UP! You are now Level '+newLevel,'gold',5000);
      setPuzzle(null);setAns('');
    }else{
      SFX.play('error');
      notify('❌ WRONG ANSWER — Try again!','error');
      log(`❌ WRONG: "${ans}" — HINT: ${puzzle.hint}`,'error');
    }
  };

  useEffect(()=>()=>clearInterval(timerRef.current),[]);

  const pct=puzzle?Math.round((timer/LIMITS[diff])*100):100;

              onClick={()=>{if(!locked){SFX.play('click');setDiff(d);setPuzzle(null);clearInterval(timerRef.current);}}}
            >
              <div className="level-icon">{d==='easy'?'🟢':d==='medium'?'🟡':'🔴'}</div>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:'0.8rem',color:d==='easy'?'var(--green)':d==='medium'?'var(--orange)':'var(--red)',letterSpacing:2}}>{d.toUpperCase()}</div>
              <div style={{fontSize:'0.7rem',color:'rgba(0,255,65,0.5)',marginTop:4}}>
                {d==='easy'?'Req: Level 1':d==='medium'?'Req: Level 3':'Req: Level 6'}
              </div>
              {locked&&<div style={{fontSize:'0.7rem',color:'var(--red)',marginTop:4}}>🔒 LOCKED</div>}
              <div className={`badge badge-${d}`} style={{marginTop:6}}>{d==='easy'?'80-90 XP':d==='medium'?'120-160 XP':'220-280 XP'}</div>
            </div>
          );

        </div>

          {puzzle?(
            <div>
              <div style={{color:'var(--cyan)',fontSize:'0.8rem',marginBottom:8}}>TYPE: {puzzle.type.toUpperCase()} | REWARD: <span style={{color:'var(--gold)'}}>{puzzle.xp}XP {puzzle.coins}💰</span></div>
              <div style={{fontSize:'1rem',lineHeight:1.8}}>{puzzle.q}</div>
              {showHint&&<div style={{marginTop:12,padding:'8px 12px',background:'rgba(255,140,0,0.1)',border:'1px solid var(--orange)',borderRadius:6,color:'var(--orange)',fontSize:'0.85rem'}}>💡 HINT: {puzzle.hint}</div>}
            </div>
          ):(
            <span style={{opacity:0.4,fontSize:'0.9rem'}}>▸ [STANDING BY] Select difficulty and generate a puzzle...</span>
          )}
        </div>

        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <input value={ans} onChange={e=>setAns(e.target.value)} placeholder=">_ ENTER DECRYPTION KEY..." disabled={!puzzle} onKeyPress={e=>e.key==='Enter'&&puzzle&&submit()} style={{flex:2}}/>
          <button className="btn btn-green" onClick={submit} disabled={!puzzle} style={{whiteSpace:'nowrap'}}>⫸ EXECUTE</button>
        </div>
        <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
          <button className="btn btn-cyan" style={{flex:1,fontSize:'0.8rem'}} onClick={getRandomPuzzle}>🎲 GENERATE PUZZLE</button>
          {puzzle&&!showHint&&(
            <button className="btn btn-gold" style={{flex:1,fontSize:'0.8rem'}} onClick={()=>{SFX.play('click');setShowHint(true);setHintUsed(true);notify('💡 Hint revealed (-30% XP penalty)','error');}}>💡 REVEAL HINT (-30%)</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ===== RIDDLES TAB ===== */
function RiddlesTab({cu,updateCu,log}){
  const[answers,setAnswers]=useState({});
  const[revealed,setRevealed]=useState({});
  const[showHints,setShowHints]=useState({});

  const submitRiddle=(r)=>{
    SFX.play('click');
    const a=answers[r.id]||'';
    if(a.trim().toLowerCase()===r.a.toLowerCase()){
      if(cu.riddleKeys.includes(r.key)){notify('Key already collected!','error');return;}
      const updated={...cu,riddleKeys:[...cu.riddleKeys,r.key],coins:cu.coins+(r.clue==='COIN_BOOST_500'?500:0)};
      updateCu(updated);
      SFX.play('unlock');
      setRevealed({...revealed,[r.id]:true});
      notify('🔑 KEY UNLOCKED: '+r.key,'gold',5000);
      log('🔑 RIDDLE SOLVED! Key: '+r.key+' | '+r.reward,'gold');
      if(r.clue==='COIN_BOOST_500')notify('💰 +500 COINS AWARDED!','gold');
    }else{
      SFX.play('error');
      notify('❌ Wrong answer!','error');
      log('❌ Wrong riddle answer: "'+a+'"','error');
    }
  };

  return(
    <div>
      <div style={{color:'var(--orange)',fontSize:'0.8rem',letterSpacing:1,marginBottom:12,padding:'8px 12px',background:'rgba(255,140,0,0.08)',border:'1px solid rgba(255,140,0,0.3)',borderRadius:6}}>
        🔑 Solve riddles to unlock SECRET KEYS. Keys reveal hints, boost XP, and unlock special puzzles!
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {RIDDLES.map(r=>{
          const solved=cu.riddleKeys.includes(r.key)||revealed[r.id];
          return(
            <div key={r.id} className={`riddle-key${solved?' panel-glow-gold':''}`} style={solved?{background:'rgba(255,215,0,0.05)',border:'1px solid var(--gold)',borderRadius:8,padding:14}:{}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{color:'var(--orange)',fontSize:'0.75rem',letterSpacing:1}}>RIDDLE #{r.id.slice(1)}</span>
                <span style={{color:'rgba(0,255,65,0.5)',fontSize:'0.72rem'}}>{r.reward}</span>
              </div>
              <div className="q">{r.q}</div>
              {solved?(
                <div className="key-display">🔑 {r.key}</div>
              ):(
                <div style={{marginTop:10}}>
                  <div style={{display:'flex',gap:8}}>
                    <input value={answers[r.id]||''} onChange={e=>setAnswers({...answers,[r.id]:e.target.value})} placeholder=">_ your answer..." onKeyPress={e=>e.key==='Enter'&&submitRiddle(r)}/>
                    <button className="btn btn-gold" style={{whiteSpace:'nowrap',padding:'8px 14px'}} onClick={()=>submitRiddle(r)}>UNLOCK</button>
                  </div>
                  <span className="hint-btn" onClick={()=>{SFX.play('click');setShowHints({...showHints,[r.id]:true});}}>
                    {showHints[r.id]?`💡 Think about: ${r.a.length}-letter word`:'💡 Need a hint?'}
                  </span>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ===== CRYPTO LAB ===== */
function CryptoLabTab(){
  const[input,setInput]=useState('');
  const[output,setOutput]=useState('');
  const[mode,setMode]=useState('rot13');
  const[shift,setShift]=useState(3);

  const ops={
    rot13:{label:'ROT13',fn:s=>rot13(s)},
    hex_enc:{label:'Text → HEX',fn:s=>Array.from(s).map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join(' ')},
    hex_dec:{label:'HEX → Text',fn:s=>hexToAscii(s)},
    b64_enc:{label:'Text → Base64',fn:s=>{try{return btoa(s);}catch{return 'Error';}}},
    b64_dec:{label:'Base64 → Text',fn:s=>atob64(s)},
    bin_enc:{label:'Text → Binary',fn:s=>Array.from(s).map(c=>c.charCodeAt(0).toString(2).padStart(8,'0')).join(' ')},
    bin_dec:{label:'Binary → Text',fn:s=>s.split(' ').map(b=>{try{return String.fromCharCode(parseInt(b,2));}catch{return '?';}}).join('')},
    caesar_enc:{label:'Caesar Encrypt',fn:s=>s.replace(/[a-z]/gi,c=>{const base=c<='Z'?65:97;return String.fromCharCode((c.charCodeAt(0)-base+shift+26)%26+base);})},
    caesar_dec:{label:'Caesar Decrypt',fn:s=>caesarDecrypt(s,shift)},
    reverse:{label:'Reverse',fn:s=>s.split('').reverse().join('')},
    md5_demo:{label:'MD5 Demo',fn:s=>`MD5("${s.slice(0,20)}") = [requires server-side] — Use CyberChef online for full MD5`},
  };

  const run=()=>{SFX.play('click');setOutput(ops[mode].fn(input));};

  return(
    <div>
      <div className="panel panel-glow-cyan">
        <div style={{color:'var(--cyan)',fontFamily:"'Orbitron',monospace",fontSize:'0.85rem',letterSpacing:2,marginBottom:14}}>◈ CRYPTO LABORATORY</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div>
            <label>▸ OPERATION</label>
            <select value={mode} onChange={e=>{setMode(e.target.value);}}>
              {Object.entries(ops).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          {(mode==='caesar_enc'||mode==='caesar_dec')&&(
            <div>
              <label>▸ SHIFT VALUE</label>
              <input type="number" min="1" max="25" value={shift} onChange={e=>setShift(Number(e.target.value))}/>
            </div>
          )}
        </div>
        <div className="field">
          <label>▸ INPUT</label>
          <textarea rows="3" value={input} onChange={e=>setInput(e.target.value)} placeholder="Enter text to encrypt/decrypt..."/>
        </div>
        <button className="btn btn-cyan btn-full" onClick={run}>⫸ EXECUTE {ops[mode].label.toUpperCase()}</button>
        {output&&(
          <div style={{marginTop:14}}>
            <label>▸ OUTPUT</label>
            <div style={{background:'#001209',border:'2px dashed var(--green)',borderRadius:6,padding:12,color:'var(--green)',wordBreak:'break-all',fontFamily:"'Share Tech Mono',monospace",fontSize:'0.9rem',lineHeight:1.6}}>
              {output}
            </div>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn btn-green" style={{fontSize:'0.75rem',padding:'6px 12px'}} onClick={()=>{setInput(output);setOutput('');}}>↻ USE AS INPUT</button>
              <button className="btn btn-pink" style={{fontSize:'0.75rem',padding:'6px 12px'}} onClick={()=>{setOutput('');setInput('');}}>✕ CLEAR</button>
            </div>
          </div>
        )}
      </div>

      {/* REFERENCE TABLE */}
      <div className="panel" style={{marginTop:14}}>
        <div style={{color:'var(--cyan)',fontSize:'0.8rem',letterSpacing:2,marginBottom:10}}>▸ ASCII / HEX QUICK REFERENCE</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:4,fontSize:'0.72rem'}}>
          {[['A','41','65'],['B','42','66'],['C','43','67'],['D','44','68'],['E','45','69'],['F','46','70'],['G','47','71'],['H','48','72'],['space','20','32'],['0','30','48'],['1','31','49'],].map(([c,h,d])=>(
            <div key={c} style={{background:'#000a04',border:'1px solid rgba(0,255,65,0.15)',borderRadius:4,padding:'4px 8px',display:'flex',gap:6}}>
              <span style={{color:'var(--gold)'}}>{c}</span>
              <span style={{color:'var(--cyan)'}}>0x{h}</span>
              <span style={{color:'rgba(0,255,65,0.5)'}}>d{d}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ===== STORE TAB ===== */
function StoreTab({cu,updateCu}){
  const buy=(item)=>{
    SFX.play('click');
    if(cu.unlockedAvatars.includes(item.id)){
      updateCu({...cu,avatar:item.emoji});
      SFX.play('success');
      notify('✅ Avatar equipped: '+item.emoji+' '+item.name,'info');
    }else if(cu.coins>=item.price){
      const updated={...cu,coins:cu.coins-item.price,unlockedAvatars:[...cu.unlockedAvatars,item.id],avatar:item.emoji};
      updateCu(updated);
      SFX.play('unlock');
      notify('🛒 Purchased & equipped: '+item.emoji+' '+item.name,'gold');
    }else{
      SFX.play('error');
      notify('❌ Insufficient coins! Need '+item.price+'💰','error');
    }
  };

  return(
    <div>
      <div className="panel panel-glow-gold">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{color:'var(--gold)',fontFamily:"'Orbitron',monospace",fontSize:'0.9rem',letterSpacing:2}}>🛒 IDENTITY STORE</div>
          <div style={{color:'var(--gold)',fontSize:'0.9rem'}}>Balance: {cu.coins}💰</div>
        </div>
        <div className="store-grid">
          {STORE_ITEMS.map(item=>{
            const owned=item.price===0||cu.unlockedAvatars.includes(item.id);
            const equipped=cu.avatar===item.emoji;
            return(
              <div key={item.id} className={`store-item${equipped?' equipped':owned?' owned':''}`} onClick={()=>buy(item)}>
                <div className="store-emoji">{item.emoji}</div>
                <div className="store-name">{item.name}</div>
                <div className="store-price">
                  {equipped?'✅ ON':(owned?'EQUIP':item.price===0?'FREE':item.price+'💰')}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{marginTop:14,padding:'10px 14px',background:'rgba(255,215,0,0.05)',border:'1px dashed rgba(255,215,0,0.3)',borderRadius:6,fontSize:'0.78rem',color:'rgba(255,215,0,0.6)',lineHeight:1.8}}>
          💡 Earn coins by solving puzzles. Harder puzzles = more coins!<br/>
          🔑 Riddle keys can unlock bonus coins via the Riddles tab.<br/>
          🎭 PHANTOM avatar requires 5000💰 — only elite hackers can afford it.
        </div>
      </div>
    </div>
  );
}
