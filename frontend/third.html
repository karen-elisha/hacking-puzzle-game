<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡ DATA STREAM HACKER // CATCH THE CODE ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root {
  --green: #00ff41;
  --cyan: #00fff9;
  --pink: #ff00c1;
  --orange: #ff8c00;
  --gold: #ffd700;
  --red: #ff3366;
  --purple: #9d00ff;
  --dark: #000500;
  --glow: 0 0 20px rgba(0,255,65,0.5);
}
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }
body {
  font-family: 'Share Tech Mono', monospace;
  background: var(--dark);
  color: var(--green);
  min-height: 100vh;
  overflow-x: hidden;
  cursor: none;
}
#matrix-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.3; pointer-events:none; }
.scan-line {
  position: fixed; top:0; left:0; width:100%; height:3px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  opacity: 0.2; z-index: 9998; animation: scanMove 4s linear infinite; pointer-events:none;
}
@keyframes scanMove { to { top: 100vh; } }
.glitched {
  font-family: 'Orbitron', monospace;
  text-shadow: 0.05em 0 0 var(--pink), -0.05em -0.025em 0 var(--cyan);
  animation: glitchFlicker 3s infinite;
}
@keyframes glitchFlicker {
  0%,100%{text-shadow:0.05em 0 0 var(--pink),-0.05em -0.025em 0 var(--cyan);}
  25%{text-shadow:-0.05em 0 0 var(--pink),0.05em 0.025em 0 var(--cyan);}
  50%{text-shadow:0.025em 0.05em 0 var(--pink),-0.025em -0.05em 0 var(--cyan);}
  75%{text-shadow:-0.025em 0 0 var(--pink),0.025em -0.025em 0 var(--cyan);}
}
.container { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; padding: 16px; }
.header {
  border: 1px solid rgba(0,255,65,0.3);
  background: rgba(0,10,3,0.95);
  border-radius: 12px;
  padding: 14px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  backdrop-filter: blur(8px);
}
.logo {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 1.2rem;
  letter-spacing: 3px;
  color: var(--green);
  text-shadow: 0 0 20px var(--green);
}
.status { display: flex; gap: 20px; align-items: center; font-size: 0.75rem; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); display: inline-block; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.btn-back {
  background: linear-gradient(135deg,#1a3300,#0a1a00);
  border: 1.5px solid var(--gold);
  color: var(--gold);
  padding: 8px 20px;
  border-radius: 40px;
  cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-weight: bold;
  letter-spacing: 2px;
  transition: 0.2s;
}
.btn-back:hover { background: linear-gradient(135deg,#2a4a00,#1a2a00); box-shadow: 0 0 20px var(--gold); transform: scale(1.02); }

.game-card {
  background: rgba(0,10,3,0.95);
  border: 1px solid rgba(0,255,65,0.4);
  border-radius: 16px;
  padding: 20px;
  box-shadow: var(--glow), inset 0 0 30px rgba(0,255,65,0.02);
  backdrop-filter: blur(8px);
}
.game-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.85rem;
  letter-spacing: 3px;
  color: var(--cyan);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(0,255,65,0.2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.tag {
  font-size: 0.6rem;
  background: rgba(0,255,65,0.1);
  border: 1px solid rgba(0,255,65,0.4);
  border-radius: 100px;
  padding: 2px 10px;
  color: var(--green);
}

/* Game Area */
.game-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
canvas {
  background: #000804;
  border: 2px solid var(--green);
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(0,255,65,0.3);
  cursor: none;
}
.stats-panel {
  display: flex;
  gap: 40px;
  font-family: 'VT323', monospace;
  font-size: 1.2rem;
  background: rgba(0,20,5,0.6);
  padding: 10px 30px;
  border-radius: 40px;
  border: 1px solid rgba(0,255,65,0.3);
}
.stats-panel span { color: var(--gold); font-weight: bold; font-size: 1.4rem; margin-left: 8px; }
.controls {
  display: flex;
  gap: 15px;
}
.game-btn {
  padding: 8px 24px;
  border-radius: 40px;
  border: 1.5px solid var(--cyan);
  background: rgba(0,255,249,0.08);
  color: var(--cyan);
  cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-weight: bold;
  letter-spacing: 2px;
  transition: 0.2s;
}
.game-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 18px var(--cyan); transform: translateY(-2px); }
.instruction {
  font-size: 0.7rem;
  color: rgba(0,255,65,0.4);
  letter-spacing: 1px;
  margin-top: 8px;
}
.custom-cursor {
  position: fixed;
  width: 30px;
  height: 30px;
  border: 2px solid var(--cyan);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: 0.05s linear;
  box-shadow: 0 0 15px var(--cyan);
}
.custom-cursor::after {
  content: '▶';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--cyan);
  font-size: 12px;
}
.terminal {
  background: #000804;
  border: 1px solid rgba(0,255,65,0.2);
  border-radius: 10px;
  padding: 12px;
  height: 100px;
  overflow-y: auto;
  font-size: 0.72rem;
  margin-top: 16px;
}
.terminal-line { padding: 2px 0; }
.term-success { color: var(--green); }
.term-info { color: var(--cyan); }
.term-error { color: var(--red); }
.term-gold { color: var(--gold); }
</style>
</head>
<body>
<canvas id="matrix-bg"></canvas>
<div class="scan-line"></div>
<div class="custom-cursor" id="customCursor"></div>

<div class="container">
  <div class="header">
    <div class="logo glitched">⚡ DATA STREAM HACKER</div>
    <div class="status">
      <span><span class="status-dot"></span> ACTIVE</span>
      <span style="color:rgba(0,255,65,0.5)">COLLECT // SURVIVE</span>
    </div>
    <button class="btn-back" id="backToMainBtn"><i class="fas fa-terminal"></i> BACK TO TERMINAL</button>
  </div>

  <div class="game-card">
    <div class="game-title">
      <span>💾 CATCH THE CODE // AVOID VIRUSES</span>
      <span class="tag">UNIQUE MOVEMENT</span>
    </div>
    <div class="game-area">
      <canvas id="gameCanvas" width="700" height="500" style="width:100%; max-width:700px; height:auto; aspect-ratio:700/500;"></canvas>
      <div class="stats-panel">
        <div>📊 SCORE: <span id="scoreDisplay">0</span></div>
        <div>❤️ LIVES: <span id="livesDisplay">3</span></div>
        <div>🏆 HIGH: <span id="highScoreDisplay">0</span></div>
      </div>
      <div class="controls">
        <button class="game-btn" id="startBtn">▶ START HACK</button>
        <button class="game-btn" id="resetBtn">⟳ RESET</button>
      </div>
      <div class="instruction">
        <i class="fas fa-mouse-pointer"></i> MOVE MOUSE TO CONTROL THE COLLECTOR &nbsp;&nbsp;|&nbsp;&nbsp;
        <span style="color:var(--gold);">💎 GREEN = CODE FRAGMENT (+10 pts)</span> &nbsp;&nbsp;|&nbsp;&nbsp;
        <span style="color:var(--red);">🔴 RED = VIRUS (-1 life)</span>
      </div>
    </div>
  </div>

  <div class="game-card">
    <div class="game-title">📡 SYSTEM_LOG</div>
    <div class="terminal" id="terminal"></div>
  </div>
</div>

<script>
// ==================== MATRIX BACKGROUND ====================
(function(){
  const canvas = document.getElementById('matrix-bg');
  const ctx = canvas.getContext('2d');
  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const chars = '01アイウエオカキクケコサシスセソABCDEFGHIJKLMNOPQRSTUVWXYZ<>{}[]()#@!$%';
  let drops = [];
  function initDrops(){ drops = Array(Math.floor(canvas.width / 18)).fill(0).map(() => Math.random() * -50); }
  initDrops();
  window.addEventListener('resize', initDrops);
  setInterval(() => {
    ctx.fillStyle = 'rgba(0,5,0,0.04)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = '14px monospace';
    drops.forEach((y, i) => {
      const char = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillStyle = i % 7 === 0 ? '#00fff9' : i % 5 === 0 ? '#00ff41' : 'rgba(0,255,65,0.4)';
      ctx.fillText(char, i * 18, y * 18);
      if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }, 55);
})();

// ==================== CUSTOM CURSOR ====================
const cursor = document.getElementById('customCursor');
document.addEventListener('mousemove', (e) => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
document.addEventListener('mouseleave', () => {
  cursor.style.opacity = '0';
});
document.addEventListener('mouseenter', () => {
  cursor.style.opacity = '1';
});

// ==================== SOUND FX ====================
const SFX = {
  ctx: null,
  init() { if (!this.ctx) this.ctx = new (AudioContext || webkitAudioContext)(); },
  beep(freq, dur, type, vol) {
    try {
      this.init();
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.connect(g);
      g.connect(this.ctx.destination);
      o.type = type || 'square';
      const t = this.ctx.currentTime;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(vol || 0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.start(t);
      o.stop(t + dur);
    } catch(e) {}
  },
  collect() { this.beep(880, 0.08, 'sine', 0.12); },
  hit() { this.beep(150, 0.25, 'sawtooth', 0.18); },
  gameOver() { this.beep(100, 0.6, 'sawtooth', 0.2); },
  start() { [523, 659, 784].forEach((f,i)=>setTimeout(()=>this.beep(f,0.1,'square',0.1),i*70)); }
};

// ==================== GAME VARIABLES ====================
let gameRunning = false;
let score = 0;
let lives = 3;
let highScore = localStorage.getItem('dataStreamHigh') || 0;
let particles = [];
let items = [];
let spawnCounter = 0;
let gameLoop = null;

// Canvas
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 700;
canvas.height = 500;

// Collector (player) - follows mouse
let collector = { x: 350, y: 450, radius: 18 };

// Track mouse position relative to canvas
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  let mouseX = (e.clientX - rect.left) * scaleX;
  let mouseY = (e.clientY - rect.top) * scaleY;
  mouseX = Math.min(Math.max(mouseX, 25), canvas.width - 25);
  mouseY = Math.min(Math.max(mouseY, 25), canvas.height - 25);
  collector.x = mouseX;
  collector.y = mouseY;
});

// Update displays
document.getElementById('highScoreDisplay').innerText = highScore;

function logMessage(msg, cls = 'term-info') {
  const term = document.getElementById('terminal');
  const line = document.createElement('div');
  line.className = 'terminal-line ' + cls;
  line.textContent = '> ' + msg;
  term.appendChild(line);
  term.scrollTop = term.scrollHeight;
  if(term.children.length > 40) term.removeChild(term.firstChild);
}

// Particle effect
function addParticle(x, y, color) {
  for(let i=0;i<8;i++) {
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 2,
      life: 0.8,
      color: color,
      size: 3 + Math.random() * 3
    });
  }
}

function updateParticles() {
  for(let i=0;i<particles.length;i++) {
    particles[i].x += particles[i].vx;
    particles[i].y += particles[i].vy;
    particles[i].life -= 0.03;
    particles[i].vy += 0.15;
    if(particles[i].life <= 0 || particles[i].y > canvas.height + 50) {
      particles.splice(i,1);
      i--;
    }
  }
}

// Spawn items (code fragments or viruses)
function spawnItem() {
  const type = Math.random() < 0.7 ? 'code' : 'virus'; // 70% code, 30% virus
  items.push({
    x: 20 + Math.random() * (canvas.width - 40),
    y: -20,
    radius: 12,
    type: type,
    speed: 2 + Math.random() * 2.5
  });
}

// Draw everything
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Grid effect
  ctx.strokeStyle = 'rgba(0,255,65,0.08)';
  ctx.lineWidth = 0.5;
  for(let i=0;i<canvas.width/30;i++) {
    ctx.beginPath();
    ctx.moveTo(i*30, 0);
    ctx.lineTo(i*30, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i*30);
    ctx.lineTo(canvas.width, i*30);
    ctx.stroke();
  }
  
  // Draw falling items
  for(let item of items) {
    // Glow effect
    ctx.shadowBlur = 10;
    if(item.type === 'code') {
      ctx.fillStyle = 'var(--green)';
      ctx.shadowColor = 'var(--green)';
      // Draw as a code bracket / data fragment
      ctx.font = 'bold 20px "Share Tech Mono"';
      ctx.fillText('</>', item.x - 12, item.y + 7);
      ctx.font = 'bold 14px monospace';
      ctx.fillStyle = '#aaffaa';
      ctx.fillText('0x' + Math.floor(Math.random()*255).toString(16), item.x - 8, item.y + 5);
    } else {
      ctx.fillStyle = 'var(--red)';
      ctx.shadowColor = 'var(--red)';
      // Draw virus skull/biohazard
      ctx.font = '22px "Font Awesome 6 Free"';
      ctx.fillText('\uf188', item.x - 11, item.y + 8);
      ctx.font = '10px monospace';
      ctx.fillStyle = '#ff8888';
      ctx.fillText('MALWARE', item.x - 14, item.y + 18);
    }
  }
  
  // Draw collector (cyber catcher)
  ctx.shadowBlur = 12;
  ctx.shadowColor = 'var(--cyan)';
  ctx.fillStyle = 'var(--cyan)';
  ctx.beginPath();
  ctx.arc(collector.x, collector.y, collector.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(collector.x - 5, collector.y - 4, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(collector.x + 5, collector.y - 4, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'var(--dark)';
  ctx.beginPath();
  ctx.arc(collector.x - 5, collector.y - 5, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(collector.x + 5, collector.y - 5, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'var(--green)';
  ctx.beginPath();
  ctx.ellipse(collector.x, collector.y + 5, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Draw particles
  for(let p of particles) {
    ctx.globalAlpha = p.life * 0.7;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  
  // Draw scanning line effect
  ctx.strokeStyle = 'rgba(0,255,65,0.2)';
  ctx.beginPath();
  ctx.moveTo(0, (Date.now() / 30) % canvas.height);
  ctx.lineTo(canvas.width, (Date.now() / 30) % canvas.height);
  ctx.stroke();
}

// Update game logic
function update() {
  if(!gameRunning) return;
  
  // Spawn items
  if(spawnCounter <= 0) {
    spawnItem();
    spawnCounter = 25 + Math.floor(Math.random() * 20);
  } else {
    spawnCounter--;
  }
  
  // Move items and check collisions
  for(let i=0;i<items.length;i++) {
    items[i].y += items[i].speed;
    
    // Collision with collector
    const dx = items[i].x - collector.x;
    const dy = items[i].y - collector.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    if(dist < collector.radius + items[i].radius) {
      if(items[i].type === 'code') {
        score += 10;
        document.getElementById('scoreDisplay').innerText = score;
        SFX.collect();
        addParticle(items[i].x, items[i].y, '#00ff41');
        logMessage(`✅ CODE CAPTURED! +10 points`, 'term-success');
        if(score > highScore) {
          highScore = score;
          localStorage.setItem('dataStreamHigh', highScore);
          document.getElementById('highScoreDisplay').innerText = highScore;
          logMessage(`🏆 NEW HIGH SCORE: ${highScore}!`, 'term-gold');
        }
        items.splice(i,1);
        i--;
      } else {
        lives--;
        document.getElementById('livesDisplay').innerText = lives;
        SFX.hit();
        addParticle(items[i].x, items[i].y, '#ff3366');
        logMessage(`💀 VIRUS HIT! Lives left: ${lives}`, 'term-error');
        items.splice(i,1);
        i--;
        
        if(lives <= 0) {
          gameRunning = false;
          clearInterval(gameLoop);
          gameLoop = null;
          SFX.gameOver();
          logMessage(`❌ GAME OVER! Final Score: ${score}`, 'term-error');
          document.getElementById('startBtn').innerHTML = '▶ START HACK';
          draw();
          return;
        }
      }
      continue;
    }
    
    // Remove if off screen
    if(items[i].y > canvas.height + 50) {
      items.splice(i,1);
      i--;
    }
  }
  
  updateParticles();
  draw();
}

// Start game
function startGame() {
  if(gameLoop) clearInterval(gameLoop);
  gameRunning = true;
  score = 0;
  lives = 3;
  items = [];
  particles = [];
  spawnCounter = 10;
  document.getElementById('scoreDisplay').innerText = '0';
  document.getElementById('livesDisplay').innerText = '3';
  document.getElementById('startBtn').innerHTML = '🏃 HACKING...';
  SFX.start();
  logMessage('⚡ DATA STREAM HACKER ACTIVATED!', 'term-gold');
  logMessage('💎 Collect GREEN code fragments (+10 pts)', 'term-info');
  logMessage('🔴 Avoid RED viruses (-1 life)', 'term-warning');
  draw();
  gameLoop = setInterval(update, 1000/60);
}

// Reset game
function resetGame() {
  if(gameLoop) clearInterval(gameLoop);
  gameRunning = false;
  score = 0;
  lives = 3;
  items = [];
  particles = [];
  spawnCounter = 0;
  document.getElementById('scoreDisplay').innerText = '0';
  document.getElementById('livesDisplay').innerText = '3';
  document.getElementById('startBtn').innerHTML = '▶ START HACK';
  draw();
  logMessage('🔄 GAME RESET — Ready to hack', 'term-info');
}

// Button events
document.getElementById('startBtn').addEventListener('click', () => {
  if(gameRunning) return;
  startGame();
});
document.getElementById('resetBtn').addEventListener('click', resetGame);
document.getElementById('backToMainBtn').addEventListener('click', () => {
  window.location.href = 'second.html';
});

// Initial draw
draw();
logMessage('DATA STREAM HACKER v1.0 — Move mouse to collect code fragments!', 'term-gold');
logMessage('Position the CYBER COLLECTOR (cyan circle) under falling items.', 'term-info');
</script>
</body>
</html>
